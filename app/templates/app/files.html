{% for f in files %}
{% set fid = f.get('file_id', '') %}
{% set display = f.get('original_filename', f.get('filename', fid)) %}
<div class="file-item">
    <div class="file-header" data-file-id="{{ fid }}" data-partition="{{ partition }}" data-media="{{ f.media_type }}" data-source="{{ f.get('source', '') }}"
         onclick="fileClick(this)" ondblclick="event.stopPropagation();fileDblClick(this)">
        <i data-lucide="{{ f.icon }}" class="w-3 h-3 shrink-0" style="color: var(--text-subtle);"></i>
        <span class="truncate flex-1">{{ display }}</span>
        <button class="file-action-btn file-delete-btn" title="{{ t('app.delete_file') }}"
                onclick="event.stopPropagation();deleteFile(this,'{{ partition }}','{{ fid | e }}')">
            <i data-lucide="trash-2" class="w-3 h-3"></i>
        </button>
    </div>
    <div class="file-chunks" style="display:none;"></div>
</div>
{% endfor %}
{% if not files %}
<div class="file-item" style="color: var(--text-subtle); font-size: 0.6875rem;">{{ t('app.no_files') if t is defined else 'No files' }}</div>
{% endif %}
