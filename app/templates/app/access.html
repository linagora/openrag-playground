<!-- Grant access form -->
<form hx-post="{{ url_for('chat.grant_access', partition=partition) }}"
      hx-target="closest .partition-access"
      hx-swap="innerHTML"
      class="flex gap-1 mb-2 items-end px-1">
    <input type="email" name="email" required placeholder="user@example.com"
           class="flex-1 px-2 py-1 rounded text-[10px] outline-none"
           style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary);">
    <select name="role" class="px-1 py-1 rounded text-[10px] outline-none"
            style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary);">
        <option value="viewer">Viewer</option>
        <option value="editor">Editor</option>
        <option value="owner">Owner</option>
    </select>
    <button type="submit" class="px-2 py-1 rounded text-[10px] cursor-pointer"
            style="background: var(--accent); color: white;">
        <i data-lucide="user-plus" class="w-3 h-3"></i>
    </button>
</form>

<!-- Current access list -->
{% if users %}
{% for u in users %}
<div class="flex items-center gap-1 px-1 py-0.5 rounded text-[10px]" style="color: var(--text-muted);">
    <i data-lucide="user" class="w-2.5 h-2.5 shrink-0"></i>
    <span class="truncate flex-1">{{ u.get('external_user_id', u.get('email', u.get('user_id', '?'))) }}</span>
    <form hx-post="{{ url_for('chat.update_access', partition=partition) }}"
          hx-target="closest .partition-access"
          hx-swap="innerHTML"
          class="flex items-center gap-1">
        <input type="hidden" name="email" value="{{ u.get('external_user_id', u.get('email', u.get('user_id', ''))) }}">
        <select name="role" onchange="this.form.requestSubmit()"
                class="px-1 py-0.5 rounded text-[10px] outline-none cursor-pointer"
                style="background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-primary);">
            <option value="viewer" {{ 'selected' if u.get('role') == 'viewer' }}>viewer</option>
            <option value="editor" {{ 'selected' if u.get('role') == 'editor' }}>editor</option>
            <option value="owner" {{ 'selected' if u.get('role') == 'owner' }}>owner</option>
        </select>
    </form>
    <form hx-post="{{ url_for('chat.revoke_access', partition=partition) }}"
          hx-target="closest .partition-access"
          hx-swap="innerHTML">
        <input type="hidden" name="email" value="{{ u.get('external_user_id', u.get('email', u.get('user_id', ''))) }}">
        <button type="submit" class="cursor-pointer" style="color: var(--danger);">
            <i data-lucide="x" class="w-3 h-3"></i>
        </button>
    </form>
</div>
{% endfor %}
{% else %}
<div class="text-[10px] px-1 py-1" style="color: var(--text-subtle);">{{ t('app.no_access') if t is defined else 'No users' }}</div>
{% endif %}
