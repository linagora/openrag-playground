<!-- Add prompt form -->
<form hx-post="{{ url_for('admin.add_prompt') }}"
      hx-target="#tab-content" hx-swap="innerHTML"
      class="rounded-lg p-4 mb-6"
      style="background: var(--bg-elevated);">
    <div class="mb-3">
        <label class="block text-xs mb-1" style="color: var(--text-subtle);">{{ t('admin.prompt.scope') }}</label>
        <select name="scope" class="w-full px-3 py-2 rounded-lg text-sm outline-none"
                style="background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);">
            <option value="global">Global</option>
            {% for g in groups %}
            <option value="group:{{ g.id }}">{{ g.label }}</option>
            {% endfor %}
            {% for u in users %}
            <option value="user:{{ u.id }}">{{ u.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-4">
        <label class="block text-xs mb-1" style="color: var(--text-subtle);">{{ t('admin.prompt.text') }} *</label>
        <textarea name="prompt" required rows="3" placeholder="Please summarize the key terms..."
                  class="w-full px-3 py-2 rounded-lg text-sm outline-none resize-y"
                  style="background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);"></textarea>
    </div>
    <button type="submit"
            class="w-full py-2.5 rounded-lg text-sm font-semibold cursor-pointer transition-opacity duration-150 hover:opacity-90"
            style="background: var(--accent); color: white;">
        {{ t('admin.prompt.add') }}
    </button>
</form>

<!-- Existing prompts -->
{% if prompts %}
<div class="space-y-2">
    {% for p in prompts %}
    <div class="flex items-start gap-3 px-4 py-3 rounded-lg"
         style="background: var(--bg-elevated); border: 1px solid var(--border);">
        <i data-lucide="message-square" class="w-4 h-4 mt-0.5 shrink-0" style="color: var(--accent);"></i>
        <div class="flex-1 min-w-0">
            <div class="text-xs mb-1" style="color: var(--text-muted);">{{ p.scope }}</div>
            <div class="text-sm">{{ p.prompt | truncate(120) }}</div>
        </div>
        <button hx-get="{{ url_for('admin.edit_prompt', idx=loop.index0) }}"
                hx-target="closest div.flex" hx-swap="outerHTML"
                class="cursor-pointer transition-opacity hover:opacity-70 shrink-0"
                style="color: var(--text-muted);">
            <i data-lucide="pencil" class="w-4 h-4"></i>
        </button>
        <button hx-delete="{{ url_for('admin.remove_prompt', idx=loop.index0) }}"
                hx-target="#tab-content" hx-swap="innerHTML"
                hx-confirm="{{ t('admin.confirm_delete') }}"
                class="cursor-pointer transition-opacity hover:opacity-70 shrink-0"
                style="color: var(--danger);">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
        </button>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-sm py-8 text-center rounded-lg" style="color: var(--text-subtle); background: var(--bg-elevated);">
    {{ t('admin.prompt.empty') }}
</p>
{% endif %}
