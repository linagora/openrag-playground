{% for m in members %}
<div class="flex items-center gap-1.5 px-1 py-0.5 text-sm" style="color: var(--text-muted);">
    <span class="truncate flex-1 {{ 'opacity-40' if m.role == 'none' }}">{{ m.name }}</span>
    <div class="flex items-center gap-1 shrink-0">
        {% for r, icon in [('none','x'), ('viewer','eye'), ('editor','cloud-upload'), ('owner','shield')] %}
        <form hx-post="{{ url_for('chat.set_access', partition=partition) }}"
              hx-target="closest .partition-access"
              hx-swap="innerHTML"
              class="inline">
            <input type="hidden" name="user_id" value="{{ m.user_id }}">
            <input type="hidden" name="old_role" value="{{ m.role }}">
            <input type="hidden" name="role" value="{{ r }}">
            <button type="submit" class="p-0 border-0 bg-transparent cursor-pointer"
                    style="color: {{ 'var(--accent)' if m.role == r else 'var(--text-subtle)' }}; opacity: {{ '1' if m.role == r else '0.5' }};"
                    title="{{ t('role.' + r) }}">
                <i data-lucide="{{ icon }}" class="w-3 h-3"></i>
            </button>
        </form>
        {% endfor %}
    </div>
</div>
{% endfor %}
{% if not members %}
<div class="text-[10px] px-1 py-1" style="color: var(--text-subtle);">{{ t('app.no_access') if t is defined else 'No users' }}</div>
{% endif %}
