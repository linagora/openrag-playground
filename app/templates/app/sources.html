{% if sources %}
<div class="mt-2">
    <div class="text-xs font-semibold mb-1.5" style="color: var(--text-subtle);">
        <i data-lucide="file-text" class="w-3 h-3 inline-block" style="vertical-align: -1px;"></i>
        Sources ({{ sources | length }})
    </div>
    <div class="flex flex-wrap gap-1.5">
        {% for s in sources %}
        <div class="source-item">
            <i data-lucide="file" class="w-3 h-3 shrink-0" style="color: var(--accent);"></i>
            <span class="truncate max-w-[180px]">{{ s.get('filename', s.get('name', 'Document')) }}</span>
            {% if s.get('score') is not none %}
            <span class="text-[10px] ml-1" style="color: var(--text-subtle);">{{ (s.score * 100) | int }}%</span>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
{% endif %}
