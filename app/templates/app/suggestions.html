{% for p in prompts %}
<div class="suggestion-item" data-prompt="{{ p.prompt }}" onclick="selectSuggestion(this)">
    <div class="flex items-center gap-2">
        <i data-lucide="sparkles" class="w-3.5 h-3.5 shrink-0" style="color: var(--accent);"></i>
        <span class="text-sm">{{ p.prompt | truncate(80) }}</span>
    </div>
</div>
{% endfor %}
