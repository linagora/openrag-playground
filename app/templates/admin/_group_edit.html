<!-- Inline edit form for a group -->
<form hx-post="{{ url_for('admin.edit_group', idx=idx) }}"
      hx-target="#tab-content" hx-swap="innerHTML"
      class="flex flex-wrap gap-2 mb-2 items-end px-4 py-3 rounded-lg"
      style="background: var(--bg-elevated); border: 1px solid var(--accent);">
    <div class="flex-1 min-w-[160px]">
        <label class="block text-xs mb-1" style="color: var(--text-subtle);">{{ t('admin.group.label') }}</label>
        <input type="text" name="label" required value="{{ group.label }}"
               class="w-full px-3 py-2 rounded-lg text-sm outline-none"
               style="background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);">
    </div>
    <div class="w-16">
        <label class="block text-xs mb-1" style="color: var(--text-subtle);">{{ t('admin.group.color') }}</label>
        <input type="color" name="color" value="{{ group.color }}"
               class="w-full h-[34px] rounded-lg cursor-pointer border-0"
               style="background: var(--bg-surface);">
    </div>
    <div class="w-36">
        <label class="block text-xs mb-1" style="color: var(--text-subtle);">{{ t('admin.group.icon') }}
            <a href="https://lucide.dev/icons" target="_blank" rel="noopener" class="ml-1" style="color: var(--accent);">?</a>
        </label>
        <input type="text" name="icon" value="{{ group.icon }}"
               class="w-full px-3 py-2 rounded-lg text-sm outline-none"
               style="background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-primary);">
    </div>
    <button type="submit" class="px-4 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-opacity hover:opacity-90"
            style="background: var(--success); color: white;">
        <i data-lucide="check" class="w-4 h-4 inline-block"></i>
    </button>
    <button type="button" hx-get="{{ url_for('admin.admin_tab', tab='groups') }}" hx-target="#tab-content" hx-swap="innerHTML"
            class="px-4 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-opacity hover:opacity-90"
            style="background: var(--bg-surface); border: 1px solid var(--border); color: var(--text-muted);">
        <i data-lucide="x" class="w-4 h-4 inline-block"></i>
    </button>
</form>
